<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bridge Contact Mobile</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,700&family=Inter:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Playfair Display', serif;
      background: #fff;
      color: #333;
      overflow-x: hidden;
    }

    .header {
      height: 75px;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .menu-icon {
      position: absolute;
      left: 22px;
      color: #888;
      font-size: 18px;
    }

    .logo {
      font-size: 34px;
      font-weight: 700;
      color: #111;
    }

    .header-social {
      position: absolute;
      right: 15px;
      display: flex;
      gap: 7px;
    }

    .header-social a,
    .footer-social a {
      width: 32px;
      height: 32px;
      background: #f7c7d9;
      color: #111;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      font-size: 13px;
    }

    .map-section iframe {
      width: 100%;
      height: 300px;
      border: 0;
      display: block;
    }

    .contact-card {
      width: 88%;
      background: #f5f5f5;
      margin: -70px auto 60px;
      padding: 38px 24px;
      position: relative;
      z-index: 2;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.13);
    }

    .contact-card input,
    .contact-card textarea {
      width: 100%;
      border: none;
      border-bottom: 1px solid #aaa;
      background: transparent;
      padding: 15px 3px;
      margin-bottom: 28px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      outline: none;
    }

    .contact-card textarea {
      height: 95px;
      resize: none;
    }

    .send-btn {
      display: block;
      margin: 20px auto 0;
      padding: 13px 34px;
      border: 1px solid #333;
      background: transparent;
      color: #333;
      font-size: 12px;
      letter-spacing: 5px;
      cursor: pointer;
    }

    .visit-section {
      text-align: center;
      padding: 50px 22px 60px;
    }

    .visit-section h2 {
      font-size: 42px;
      line-height: 1.15;
      font-weight: 400;
    }

    .visit-section h2 span {
      font-style: italic;
      font-weight: 700;
    }

    .visit-section p {
      max-width: 330px;
      margin: 22px auto;
      color: #777;
      font-size: 16px;
      line-height: 1.7;
      font-family: 'Inter', sans-serif;
    }

    .shop-info {
      color: #555;
      font-size: 15px;
      line-height: 2;
      font-family: 'Inter', sans-serif;
    }

    .choco-section {
      height: 230px;
      background-image: url("https://i.ibb.co/2YFW4kwD/contact-us-img-1.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
    }

    .footer {
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)),
        url("https://i.ibb.co/gb0ztpg7/arrangement-of-various-types-of-chocolate.jpg");
      background-size: cover;
      background-position: center;
      color: #fff;
      text-align: center;
      padding: 70px 20px;
    }

    .footer h3 {
      font-size: 38px;
      margin-bottom: 22px;
    }

    .footer p {
      color: #ddd;
      font-size: 15px;
      line-height: 1.6;
      font-family: 'Inter', sans-serif;
    }

    .footer-social {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 25px;
    }

    .fixed-panel {
      display: none;
    }

    @media (max-width: 380px) {
      .logo {
        font-size: 30px;
      }

      .header-social a {
        width: 29px;
        height: 29px;
        font-size: 12px;
      }

      .visit-section h2 {
        font-size: 36px;
      }

      .contact-card {
        padding: 35px 20px;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="menu-icon">
      <i class="fa-solid fa-bars"></i>
    </div>

    <div class="logo">bridge</div>

    <div class="header-social">
      <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="#"><i class="fa-brands fa-twitter"></i></a>
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
    </div>
  </header>

  <section class="map-section">
    <iframe src="https://maps.google.com/maps?q=proddatur&t=&z=11&ie=UTF8&iwloc=&output=embed"></iframe>
  </section>

  <section class="contact-card">
    <input type="text" placeholder="Name*" />
    <input type="email" placeholder="Email*" />
    <textarea placeholder="Message"></textarea>

    <button class="send-btn">SEND</button>
  </section>

  <section class="visit-section">
    <h2><span>Visit</span> our shops</h2>

    <p>
      Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore.
    </p>

    <div class="shop-info">
      09:00–19h Monday – Friday<br />
      75-11 Jewett Ave Jersey City, NJ 07304 USA<br />
      + (1) 555 678 786
    </div>
  </section>

  <section class="choco-section"></section>

  <footer class="footer">
    <h3>bridge</h3>

    <p>
      © Copyright Qode Interactive — All Rights Reserved<br />
      Proudly Made For You.
    </p>

    <div class="footer-social">
      <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="#"><i class="fa-brands fa-twitter"></i></a>
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
    </div>
  </footer>

</body>
</html>
